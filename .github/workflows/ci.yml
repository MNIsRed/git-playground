name: CI Pipeline

# 触发条件：push 或 PR 到 main 分支
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: 代码测试
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # 运行测试
      - name: Run calculator tests
        run: node src/test.js
      
      # 运行 bisect 测试脚本
      - name: Run bisect test
        run: ./bisect-test.sh

  # Job 2: 代码检查（演示多个 Job）
  lint:
    name: Code Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check file structure
        run: |
          echo "📁 项目文件结构："
          find . -type f -not -path './.git/*' | sort
          echo ""
          echo "✅ 文件检查完成"

  # Job 3: 通知（依赖前面的 Job）
  notify:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always()
    
    steps:
      - name: Pipeline result
        run: |
          echo "🎉 CI Pipeline 执行完毕！"
          echo "Test status: ${{ needs.test.result }}"
          echo "Lint status: ${{ needs.lint.result }}"
